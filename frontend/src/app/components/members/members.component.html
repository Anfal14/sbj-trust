<section id="members" class="py-5">
  <div class="container">
    <div class="sec-badge">The Team</div>
    <h2 class="sec-title">Our <span>Members</span></h2>
    <p class="sec-subtitle">The dedicated individuals who drive our mission forward — with commitment, compassion, and community spirit.</p>

    <div class="members-board">
      <div class="members-section" *ngIf="higherRoleMembers.length">
        <div class="higher-role-grid">
          <div class="member-card role-card" *ngFor="let member of higherRoleMembers">
            <img [src]="member.image" [alt]="member.name" />
            <p class="m-name">{{ member.name }}</p>
            <span class="m-role">{{ member.role }}</span>
          </div>
        </div>
      </div>

      <div class="members-section members-section-regular" *ngIf="regularMembers.length">
        <div class="members-section-head">
          <h3>Members</h3>
        </div>

        <div class="regular-member-grid">
          <div class="regular-member" *ngFor="let member of regularMembers">
            <img [src]="member.image" [alt]="member.name" />
            <p class="m-name">{{ member.name }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
