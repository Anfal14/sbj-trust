<section id="gallery" class="py-5">
  <div class="container">
    <div class="sec-badge">Photo Gallery</div>
    <h2 class="sec-title">Moments That <span>Matter</span></h2>
    <p class="sec-subtitle">A glimpse into our community events, welfare programs, and milestones that define our journey.</p>

    <div *ngIf="loading" class="d-flex align-items-center justify-content-center rounded-4" style="height:560px;background:#1a1a2a;">
      <div class="text-center text-white-50">
        <div class="spinner-border mb-3" style="color:var(--orange);"></div>
        <p class="mb-0" style="font-size:.9rem;">Loading gallery…</p>
      </div>
    </div>

    <div *ngIf="!loading" id="galleryCarousel" class="carousel slide gallery-carousel" data-bs-ride="carousel" data-bs-interval="3500">
      <div class="carousel-indicators">
        <button *ngFor="let item of items; let i = index"
          type="button" data-bs-target="#galleryCarousel" [attr.data-bs-slide-to]="i"
          [class.active]="i === 0"
          style="background:var(--orange);width:28px;height:4px;border-radius:2px;border:none;">
        </button>
      </div>
      <div class="carousel-inner rounded-4 overflow-hidden" style="box-shadow:0 8px 40px rgba(0,0,0,.18);">
        <div *ngFor="let item of items; let i = index" class="carousel-item gallery-slide" [class.active]="i === 0" [style.backgroundImage]="'url(' + item.image + ')'">
          <img [src]="item.image" class="d-block gallery-img" [alt]="item.title" />
          <div class="carousel-caption text-start">
            <h5 class="mb-0" style="font-weight:700;">{{ item.title }}</h5>
            <p class="mb-0" style="font-size:.85rem;opacity:.8;">{{ item.caption }}</p>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>
</section>
