<section id="success-stories" class="py-5">
  <div class="container">
    <div class="sec-badge">Impact Stories</div>
    <h2 class="sec-title">Lives <span>Transformed</span></h2>
    <p class="sec-subtitle">Real people, real impact — hear directly from those whose lives SBJ has touched and changed.</p>

    <div id="storiesCarousel" class="carousel slide story-carousel" data-bs-ride="false">
      <div class="carousel-inner pb-4">

        <div class="carousel-item active">
          <div class="row g-4 px-2">
            <div class="col-md-4" *ngFor="let s of page1">
              <div class="story-card">
                <img [src]="s.avatar" [alt]="s.name" class="avatar" />
                <div class="quote-icon"><i class="bi bi-quote"></i></div>
                <blockquote>"{{ s.quote }}"</blockquote>
                <p class="s-name">{{ s.name }}</p>
                <p class="s-role">{{ s.role }}</p>
              </div>
            </div>
          </div>
        </div>

        <div class="carousel-item">
          <div class="row g-4 px-2">
            <div class="col-md-4" *ngFor="let s of page2">
              <div class="story-card">
                <img [src]="s.avatar" [alt]="s.name" class="avatar" />
                <div class="quote-icon"><i class="bi bi-quote"></i></div>
                <blockquote>"{{ s.quote }}"</blockquote>
                <p class="s-name">{{ s.name }}</p>
                <p class="s-role">{{ s.role }}</p>
              </div>
            </div>
          </div>
        </div>

      </div>

      <div class="carousel-indicators position-relative mt-2">
        <button type="button" data-bs-target="#storiesCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#storiesCarousel" data-bs-slide-to="1"></button>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#storiesCarousel" data-bs-slide="prev" style="left:-20px;">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#storiesCarousel" data-bs-slide="next" style="right:-20px;">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </div>
</section>
