<!DOCTYPE html>
<html>
<head>
  <title>My Netlify Site</title>

  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <header>
    <h1>My Website</h1>
    <a href="/admin/">Open CMS</a>
    <button onclick="netlifyIdentity.open()">Login</button>
  </header>

  <main>
    <section id="posts">
      <h2>Latest Posts</h2>
      <div id="posts-list">Loading posts…</div>
    </section>
  </main>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    // List of markdown files in _posts (generated from repository files)
    const postFiles = [
      '_posts/ab-rahman.md',
      '_posts/hi-anfal.md',
      '_posts/hi-muntaseem.md'
    ];

    function parseFrontMatter(md) {
      const fmMatch = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
      let fm = {};
      let content = md;
      if (fmMatch) {
        const fmText = fmMatch[1];
        content = md.slice(fmMatch[0].length).trim();
        const titleMatch = fmText.match(/title:\s*["']?(.*?)["']?\s*$/m);
        if (titleMatch) fm.title = titleMatch[1].trim();
      }
      return { frontmatter: fm, content };
    }

    async function loadPosts() {
      const listEl = document.getElementById('posts-list');
      listEl.innerHTML = '';
      for (const path of postFiles) {
        try {
          const res = await fetch('./' + path);
          if (!res.ok) throw new Error('Not found');
          const md = await res.text();
          const { frontmatter, content } = parseFrontMatter(md);
          const title = frontmatter.title || path;
          const excerpt = (content || '').replace(/<!--([\s\S]*?)-->/g, '').split('\n').find(l => l.trim()) || '';

          const article = document.createElement('article');
          const h3 = document.createElement('h3');
          h3.textContent = title;
          const p = document.createElement('p');
          p.textContent = excerpt.length > 200 ? excerpt.slice(0, 200) + '…' : excerpt;
          article.appendChild(h3);
          article.appendChild(p);
          listEl.appendChild(article);
        } catch (err) {
          console.warn('Failed to load', path, err.message);
        }
      }
      if (!listEl.children.length) listEl.textContent = 'No posts found.';
    }

    loadPosts();
  </script>

</body>
</html>
